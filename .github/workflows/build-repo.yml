name: Build & publish pacman repo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Bootstrap Arch build environment
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel git gnupg rust go \
            python python-build python-installer python-wheel python-setuptools \
            nftables curl libnotify gtk3 nss libsecret libx11 libxcb alsa-lib

      - name: Import signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "default-key 15F2474EEEA7F452" >> ~/.gnupg/gpg.conf

      - name: Checkout packages repo
        uses: actions/checkout@v4
        with:
          repository: golden-arch/packages
          path: packages

      - name: Build all packages
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          mkdir -p /tmp/pkgs
          cp -r packages /home/builder/packages
          chown -R builder:builder /home/builder/packages /tmp/pkgs
          cd /home/builder/packages
          for pkg in */; do
            pkg="${pkg%/}"
            [ -f "$pkg/PKGBUILD" ] || continue
            echo "==> Building $pkg"
            pushd "$pkg"
            su builder -c "PACKAGER='Golden Arch <releases@golden-arch.org>' makepkg --noconfirm --nodeps --skipinteg" && \
              find . -name '*.pkg.tar.zst' -exec cp {} /tmp/pkgs/ \; || \
              echo "WARNING: $pkg failed, continuing"
            popd
          done

      - name: Sign packages
        run: |
          for pkg in /tmp/pkgs/*.pkg.tar.zst; do
            [ -f "$pkg" ] || continue
            gpg --batch --yes --detach-sign "$pkg"
          done

      - name: Checkout repo branch
        uses: actions/checkout@v4
        with:
          repository: golden-arch/repo
          ref: gh-pages
          path: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update pacman database
        run: |
          mkdir -p gh-pages/x86_64
          find /tmp/pkgs -name '*.pkg.tar.zst' -exec cp {} gh-pages/x86_64/ \;
          find /tmp/pkgs -name '*.pkg.tar.zst.sig' -exec cp {} gh-pages/x86_64/ \;
          cd gh-pages/x86_64
          repo-add --sign golden-arch.db.tar.zst *.pkg.tar.zst || true

      - name: Push to GitHub Pages
        run: |
          cd gh-pages
          git config user.name  "Golden Arch Bot"
          git config user.email "releases@golden-arch.org"
          git add -A
          git commit -m "ci: rebuild repo $(date -u +%Y-%m-%dT%H:%M:%SZ)" || true
          git push
