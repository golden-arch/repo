name: Build & publish pacman repo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: archlinux:latest

    steps:
      - name: Bootstrap Arch build environment
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel git gnupg rust go github-cli \
            python python-build python-installer python-wheel python-setuptools \
            nftables curl libnotify gtk3 nss libsecret libx11 libxcb alsa-lib

      - name: Import signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "default-key 15F2474EEEA7F452" >> ~/.gnupg/gpg.conf

      - name: Checkout packages repo
        uses: actions/checkout@v4
        with:
          repository: golden-arch/packages
          path: packages

      - name: Build all packages
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          mkdir -p /tmp/pkgs
          cp -r packages /home/builder/packages
          chown -R builder:builder /home/builder/packages /tmp/pkgs
          cd /home/builder/packages
          for pkg in */; do
            pkg="${pkg%/}"
            [ -f "$pkg/PKGBUILD" ] || continue
            echo "==> Building $pkg"
            pushd "$pkg"
            su builder -c "PACKAGER='Golden Arch <releases@golden-arch.org>' makepkg --noconfirm --nodeps --skipinteg" && \
              find . -name '*.pkg.tar.zst' -exec cp {} /tmp/pkgs/ \; || \
              echo "WARNING: $pkg failed, continuing"
            popd
          done

      - name: Sign packages
        run: |
          for pkg in /tmp/pkgs/*.pkg.tar.zst; do
            [ -f "$pkg" ] || continue
            gpg --batch --yes --detach-sign "$pkg"
          done

      - name: Build pacman database
        run: |
          cd /tmp/pkgs
          repo-add --sign golden-arch.db.tar.zst *.pkg.tar.zst
          # Resolve symlinks to real files for upload
          for f in golden-arch.db golden-arch.db.sig golden-arch.files golden-arch.files.sig; do
            [ -L "$f" ] && cp --dereference "$f" "${f}.real" && mv "${f}.real" "$f"
          done

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete packages --repo golden-arch/repo --yes 2>/dev/null || true
          gh release create packages \
            --repo golden-arch/repo \
            --title "Package Repository ($(date -u +%Y-%m-%d))" \
            --notes "Golden Arch pacman repository. Add to pacman.conf:
          [golden-arch]
          SigLevel = Required
          Server = https://github.com/golden-arch/repo/releases/download/packages" \
            /tmp/pkgs/*.pkg.tar.zst \
            /tmp/pkgs/*.pkg.tar.zst.sig \
            /tmp/pkgs/golden-arch.db \
            /tmp/pkgs/golden-arch.db.sig \
            /tmp/pkgs/golden-arch.db.tar.zst \
            /tmp/pkgs/golden-arch.db.tar.zst.sig \
            /tmp/pkgs/golden-arch.files \
            /tmp/pkgs/golden-arch.files.sig \
            /tmp/pkgs/golden-arch.files.tar.zst \
            /tmp/pkgs/golden-arch.files.tar.zst.sig
